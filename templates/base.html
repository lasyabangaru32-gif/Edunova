<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}EduNova{% endblock %}</title>

  <style>

/* =========================
   GLOBAL RESET
========================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: #0f1c2e; /* deep navy */
    color: #e6edf7;
}

/* =========================
   LAYOUT
========================= */
.layout {
    display: flex;
    min-height: 100vh;
}

/* =========================
   SIDEBAR (CLASSIC UNIVERSITY BLUE)
========================= */
.sidebar {
    width: 250px;
    background: linear-gradient(180deg, #0b1a33, #122a4a);
    padding: 25px 18px;
    color: #e6edf7;
    box-shadow: 5px 0 20px rgba(0,0,0,0.4);
}

.sidebar h2 {
    text-align: center;
    margin-bottom: 25px;
    color: #ffd36a; /* warm academic gold */
    letter-spacing: 1px;
}

.sidebar a {
    display: block;
    color: #cfe2ff;
    text-decoration: none;
    padding: 10px 12px;
    margin: 6px 0;
    border-radius: 8px;
    transition: 0.3s;
    font-weight: 500;
}

.sidebar a:hover {
    background: rgba(255, 211, 106, 0.15);
    color: #ffd36a;
    transform: translateX(6px);
}

/* =========================
   MAIN AREA
========================= */
.main {
    flex: 1;
    padding: 25px;
    background: #0f1c2e;
}

/* =========================
   HEADINGS
========================= */
h1, h2, h3 {
    color: #ffd36a;
    margin-bottom: 10px;
}

/* =========================
   CARDS (EDUCATION DASHBOARD)
========================= */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    margin-top: 20px;
}

.card {
    background: #162944;
    padding: 22px;
    border-radius: 14px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    border-left: 5px solid #ffd36a;
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-6px);
    background: #1a3357;
}

/* =========================
   TABLE STYLE
========================= */
table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
    background: #162944;
    border-radius: 10px;
    overflow: hidden;
}

table th {
    background: #122a4a;
    color: #ffd36a;
    padding: 12px;
    text-align: left;
}

table td {
    padding: 12px;
    border-bottom: 1px solid #1f3b63;
    color: #e6edf7;
}

table tr:hover {
    background: #1a3357;
}

/* =========================
   BUTTONS
========================= */
button {
    background: #ffd36a;
    color: #0f1c2e;
    border: none;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    background: #ffbf3f;
}

/* =========================
   INPUTS
========================= */
input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: 1px solid #2a4b7a;
    border-radius: 6px;
    background: #0f1c2e;
    color: #e6edf7;
}

/* =========================
   FOOTER (CLASSIC BLUE STYLE)
========================= */
footer {
    text-align: center;
    padding: 15px;
    background: #122a4a;
    color: #ffd36a;
    font-size: 14px;
    margin-top: 40px;
}

/* =========================
   DARK MODE (OPTIONAL SAME STYLE)
========================= */
.dark {
    background: #0b1625;
}

.dark .main {
    background: #0b1625;
}

.dark .card {
    background: #15263f;
}

.dark table {
    background: #15263f;
}

.dark .sidebar {
    background: linear-gradient(180deg, #081426, #0f223d);
}

.dark footer {
    background: #081426;
}

</style>
<style>

/* =========================
   SMOOTH PAGE LOAD
========================= */
.main {
    animation: fadeIn 0.5s ease-in-out;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* =========================
   CARD ANIMATION
========================= */
.card {
    animation: popIn 0.4s ease-in-out;
}

@keyframes popIn {
    from {
        transform: scale(0.95);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}

</style>

</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>📚 EduNova</h2>

        <a href="/dashboard">📊 Dashboard</a>
        <a href="/students">👨‍🎓 Students</a>
        <a href="/courses">📚 Courses</a>
        <a href="/assignments">📝 Assignments</a>
        <a href="/about">ℹ️ About</a>
        <a href="/help">❓ Help</a>
        <a href="/logout" style="color:red;">🚪 Logout</a>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">
        {% block content %}{% endblock %}
    </div>

</div>

<button onclick="toggleDarkMode()" style="
    margin-top:20px;
    padding:8px;
    width:100%;
    border:none;
    border-radius:6px;
    cursor:pointer;
">
🌙 Toggle Dark Mode
</button>
<footer>
    © 2026 EduNova | Built by Veyra 💻 | Version 1.0
</footer>
<script>
function toggleDarkMode(){
    document.body.classList.toggle("dark");
}
</script>

</body>
</html>
