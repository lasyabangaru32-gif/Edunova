<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}">
    <title>Edit Assignment</title>
</head>

<body>

    <h1>📝 Edit Assignment</h1>

    <form method="POST">

        <input type="text"
               name="title"
               value="{{ assignment[1] }}"
               required>

        <br><br>

        <input type="date"
               name="due_date"
               value="{{ assignment[2] }}"
               required>

        <br><br>

        <input type="text"
               name="status"
               value="{{ assignment[3] }}"
               required>

        <br><br>

        <button type="submit">
            Update Assignment
        </button>

    </form>

    <footer>
  <p>© 2026 EduNova | Built by Veyra 💻 | Version 1.0</p>
</footer>
</body>
</html>
