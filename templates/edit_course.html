<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}">
    <title>Edit Course</title>
</head>

<body>

    <h1>📚 Edit Course</h1>

    <form method="POST">

        <input type="text"
               name="course_name"
               value="{{ course[1] }}"
               required>

        <br><br>

        <input type="text"
               name="course_code"
               value="{{ course[2] }}"
               required>

        <br><br>

        <input type="text"
               name="instructor"
               value="{{ course[3] }}"
               required>

        <br><br>

        <button type="submit">
            Update Course
        </button>

    </form>

    <footer>
  <p>© 2026 EduNova | Built by Veyra 💻 | Version 1.0</p>
</footer>
</body>
</html>
