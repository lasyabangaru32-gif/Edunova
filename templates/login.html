<!DOCTYPE html>
<html>
<head>
    <title>EduNova Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f1c2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: #162944;
            padding: 30px;
            border-radius: 14px;
            width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-top: 4px solid #ffd36a;
        }

        h2 {
            text-align: center;
            color: #ffd36a;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #0f1c2e;
            border: 1px solid #2a4b7a;
            color: #fff;
            border-radius: 6px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #ffd36a;
            border: none;
            color: #0f1c2e;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #ffbf3f;
        }

        .error {
            color: #ff6b6b;
            text-align: center;
        }

        footer {
            text-align: center;
            color: #ffd36a;
            margin-top: 15px;
            font-size: 13px;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>📚 EduNova Login</h2>

    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <footer>© 2026 EduNova | Built by Veyra</footer>

</div>

</body>
</html>
